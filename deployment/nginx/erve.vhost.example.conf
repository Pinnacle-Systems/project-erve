# Erve production routing — CloudPanel custom Nginx vhost additions.
#
# CloudPanel generates and manages its own vhost for the site (SSL
# certificate paths, its own security/logging includes, and the base
# `server { ... }` block). Do NOT replace that file wholesale. Instead,
# open the CloudPanel-managed vhost for <DOMAIN_NAME> (CloudPanel UI ->
# Sites -> <DOMAIN_NAME> -> Vhost) and splice the three `location` blocks
# below into the existing `server { }` block, leaving everything else
# CloudPanel already generated (ssl_certificate, the security/logging
# `include` directives, etc.) untouched.
#
# Placeholders to replace:
#   <DEPLOY_ROOT>  e.g. /home/<SITE_USER>/htdocs/<DOMAIN_NAME>
#   <APP_PORT>     the local port CloudPanel assigned this site's Node app
#
# After editing, validate and reload:
#   nginx -t
#   sudo systemctl reload nginx    (or CloudPanel's own reload action)

# --- 1. Static web frontend (SPA) -------------------------------------------
# Served from the active release via the `current` symlink so a deploy's
# atomic symlink swap takes effect immediately with no Nginx reload needed.

root <DEPLOY_ROOT>/current/web;
index index.html;

location / {
    try_files $uri $uri/ /index.html;
}

# Hashed, content-addressed build assets (Vite's default `assets/` output)
# are safe to cache aggressively. index.html itself is deliberately NOT
# covered by this and keeps default (non-cached) behavior so a new
# deployment is picked up immediately.
location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# --- 2. API reverse proxy ----------------------------------------------------
# The Express app has no internal "/api" prefix (its routes are mounted at
# root: /health, /auth, /users, ...). The trailing slashes on both the
# `location` path and the `proxy_pass` target below are what strips the
# "/api" prefix before forwarding, e.g. "/api/health" -> "/health" upstream.
#
# No `proxy_cookie_path` rewrite is needed or used here for the
# authentication refresh cookie: the application itself issues that cookie
# with Path=/ (see apps/api/src/modules/auth/refresh-cookie.ts), which is
# already correct for requests arriving at "/api/auth/..." through this
# proxy — deliberately not solved with a hidden Nginx-side rewrite.

location /api/ {
    proxy_pass http://127.0.0.1:<APP_PORT>/;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # This is the API, not static content — never cache responses, and
    # never fall back to the SPA's index.html for a missing/erroring route.
    proxy_buffering off;
    proxy_cache off;
    proxy_intercept_errors off;

    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Matches the body sizes the application actually needs today; revisit
    # if/when file uploads are introduced.
    client_max_body_size 2m;
}

# --- 3. Reserved future mobile OTA bundle path -------------------------------
# Static-only for now — no OTA metadata endpoint, publishing, or activation
# exists yet (out of scope for this deployment). Reserving the route and
# directory now means the eventual OTA feature does not need an Nginx
# change to ship.

location /mobile-updates/bundles/ {
    alias <DEPLOY_ROOT>/shared/mobile-updates/bundles/;
    autoindex off;
    try_files $uri =404;
}

# active-release.json and any other files directly under
# shared/mobile-updates/ (as opposed to shared/mobile-updates/bundles/) are
# deliberately NOT routed by any location block above and are therefore not
# publicly reachable.
